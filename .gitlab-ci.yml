stages:
- lint
- test
- security-check
- secret-detection

variables:
  PYTHONPATH:   "$CI_PROJECT_DIR"
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"
  FASTAPI_ENV:  "test"
  DATABASE_URL: "sqlite+aiosqlite:///:memory:" # We will use in-memory SQLite for testing

cache:
  key:
    files:
      - uv.lock
  paths:
    - .uv-cache/

lint_code:
  stage: lint
  image: python:3.10-slim
  before_script:
    - pip install uv
    - uv sync
  script:
    - uv run ruff check
  allow_failure: false

run_tests:
  stage: test
  image: python:3.10-slim
  before_script:
    - pip install uv
    - uv sync --all-groups
  script:
    - uv run pytest --cov=app tests/ --cov-report=term-missing
  coverage: '/TOTAL.*\s+(\d+%)/'
  artifacts:
    name: "test-coverage-report"
    when: always
    expire_in: 1 week
    paths:
      - .coverage

sast:
  stage: security-check
include:
- template: Security/SAST.gitlab-ci.yml
- template: Security/Secret-Detection.gitlab-ci.yml
variables:
  SECRET_DETECTION_ENABLED: 'true'

secret_detection:
  stage: secret-detection
